{% extends 'layouts/app_base.html' %}
{% load static %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-2xl font-extrabold text-slate-800"><i class="fa-solid fa-layer-group text-indigo-500 mr-2"></i> Tasarım Kütüphanesi</h1>
            <p class="text-slate-500 text-sm mt-1">Yapay zeka ile ürettiğiniz ve bilgisayardan yüklediğiniz tüm tasarımlar tek bir yerde.</p>
        </div>
        <div>
            <input type="file" id="asset-upload-input" multiple accept="image/png, image/jpeg, image/webp" class="hidden">
            
            <button onclick="document.getElementById('asset-upload-input').click()" id="btn-upload-trigger" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg font-bold text-sm transition shadow-sm flex items-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i> <span id="upload-btn-text">Yeni Tasarım Yükle</span>
            </button>
        </div>
    </div>

    <div class="flex justify-between items-center border-b border-slate-200 mb-6">
        <div class="flex gap-6">
            <button onclick="filterAssets('all')" id="btn-filter-all" class="pb-3 font-bold text-sm border-b-2 border-indigo-600 text-indigo-600 transition">Tümü</button>
            <button onclick="filterAssets('ai')" id="btn-filter-ai" class="pb-3 font-bold text-sm border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition">Yapay Zeka (AI)</button>
            <button onclick="filterAssets('manual')" id="btn-filter-manual" class="pb-3 font-bold text-sm border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition">Manuel Yüklenenler</button>
        </div>
        <div class="pb-3">
            <label class="flex items-center cursor-pointer text-sm font-bold text-slate-700 hover:text-indigo-600 transition">
                <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this.checked)" class="mr-2 w-5 h-5 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500 cursor-pointer shadow-sm">
                Tümünü Seç
            </label>
        </div>
    </div>

    <div id="assets-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
        <div class="col-span-full text-center py-12 text-slate-400">
            <i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i>
            <p>Tasarımlar Yükleniyor...</p>
        </div>
    </div>

    <div id="batch-action-bar" class="fixed bottom-0 left-64 right-0 bg-slate-900 text-white shadow-[0_-10px_40px_rgba(0,0,0,0.2)] p-4 flex items-center justify-between z-50 transform translate-y-full transition-transform duration-300">
        <div class="flex items-center gap-4 px-4">
            <span id="selected-count-text" class="font-bold text-lg bg-indigo-600 w-10 h-10 flex items-center justify-center rounded-full shadow-inner">0</span>
            <span class="text-slate-300 font-medium tracking-wide">Tasarım Seçildi</span>
        </div>
        <div class="flex items-center gap-3 pr-4">
            <button onclick="clearSelection()" class="text-slate-400 hover:text-white px-3 py-2 text-sm font-bold transition mr-2">Seçimi Temizle</button>
            <button onclick="sendToProduction()" id="btn-route-prod" class="bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white px-8 py-2.5 rounded-lg font-bold text-sm transition shadow flex items-center gap-2">
                <i class="fa-solid fa-rocket"></i> Üretime Gönder
            </button>
        </div>
    </div>
    
{% block extra_scripts %}
<script src="{% static 'ui/js/asset_library.js' %}"></script>
{% endblock %}
</div>
{% endblock %}
